<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyumi Beatz | Official Store</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-red: #ff2e2e;
            --dark-bg: #050505; /* තරමක් තද කළු පැහැයක් */
            --card-bg: #111111;
        }

        body { 
            background-color: var(--dark-bg); 
            color: #ffffff; 
            font-family: 'Poppins', sans-serif; /* නවීන Font එකක් */
        }

        /* ----- Hero Section Styling (UPDATED) ----- */
        .hero { 
            height: 80vh; /* උස තරමක් වැඩි කළා */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            border-bottom: 1px solid #222;
            overflow: hidden;
        }

        /* පසුබිමේ ඇති රතු එළිය */
        .hero::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-red);
            filter: blur(150px);
            opacity: 0.2;
            border-radius: 50%;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            width: 100%;
        }

        /* ලෝගෝ සහ ෆොටෝ එක */
        .hero-logo, .hero-photo {
            width: 120px; /* ප්‍රමාණය සකසා ගන්න */
            height: 120px;
            border-radius: 50%; /* රවුම් කිරීමට */
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.1);
            transition: 0.5s;
        }

        .hero-logo:hover, .hero-photo:hover {
            border-color: var(--primary-red);
            transform: scale(1.05);
        }

        /* මැද තියෙන නම */
        .hero-name {
            font-size: 5rem; /* ඉතා ලොකුවට */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to bottom, #ffffff 0%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
            text-shadow: 0px 0px 20px rgba(255, 46, 46, 0.5);
        }

        @media (max-width: 768px) {
            .hero-name { font-size: 2.5rem; }
            .hero-logo, .hero-photo { width: 80px; height: 80px; }
        }

        /* ----- Animation Buttons (UPDATED) ----- */
        .btn-animated {
            position: relative;
            padding: 12px 35px;
            background: transparent;
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 1;
        }

        .btn-animated:hover {
            color: black;
            border-color: var(--primary-red);
        }

        .btn-animated::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primary-red);
            z-index: -2;
            border-radius: 50px;
        }

        .btn-animated::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background-color: white; /* Hover කළාම එන පාට */
            transition: all 0.3s ease;
            z-index: -1;
            border-radius: 50px;
        }

        .btn-animated:hover::before {
            width: 100%;
        }

        /* Glow Animation */
        @keyframes glowing {
            0% { box-shadow: 0 0 5px rgba(255, 46, 46, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 46, 46, 0.8); }
            100% { box-shadow: 0 0 5px rgba(255, 46, 46, 0.5); }
        }

        .btn-primary-glow {
            animation: glowing 2s infinite;
            background: var(--primary-red);
            border: none;
        }
        .btn-primary-glow:hover {
            background: white;
            color: black;
        }

        /* ----- Rest of the styling (from previous) ----- */
        .beat-card { background: var(--card-bg); border: 1px solid #222; border-radius: 12px; padding: 15px; transition: 0.3s; margin-bottom: 30px; text-align: center;}
        .beat-card:hover { border-color: var(--primary-red); transform: translateY(-10px); }
        .beat-img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        .btn-buy { background-color: var(--primary-red); border: none; font-weight: bold; border-radius: 50px; padding: 10px; width: 100%; transition: 0.3s;}
        .btn-buy:hover { background-color: white; color: black; }
        .social-link { font-size: 24px; color: #fff; margin: 0 15px; transition: 0.3s; }
        .social-link:hover { color: var(--primary-red); }
        footer { background: #000; padding: 50px 0; border-top: 1px solid #222; margin-top: 50px;}
        .badge-bpm { background: rgba(255, 255, 255, 0.1); padding: 5px 10px; border-radius: 20px; font-size: 12px; margin: 0 2px;}
        
    </style>
</head>
